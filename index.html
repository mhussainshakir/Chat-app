<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ChatKaro</title>
  <meta name="theme-color" content="#12151A" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="screen active" id="screen-login">
  <div class="auth-box">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <h1>ChatKaro</h1>
    </div>
    <p class="subtitle">Email aur password se login karein</p>

    <form id="form-login">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="apka@email.com" required />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Password" required />
      </div>
      <button type="submit" class="btn btn-primary">Login Karein</button>
      <div class="error-box" id="login-error"></div>
    </form>

    <div class="auth-footer">
      <p>Account nahi hai? <button class="btn-text" onclick="showScreen('signup')">Banayein</button></p>
    </div>
  </div>
</div>

<!-- SIGNUP SCREEN -->
<div class="screen" id="screen-signup">
  <div class="auth-box">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <h1>ChatKaro</h1>
    </div>
    <p class="subtitle">Naya account banayein</p>

    <form id="form-signup">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="signup-email" placeholder="apka@email.com" required />
      </div>
      <div class="input-group">
        <label>Password (6+ characters)</label>
        <input type="password" id="signup-password" placeholder="Password" minlength="6" required />
      </div>
      <div class="input-group">
        <label>Password dobara likhen</label>
        <input type="password" id="signup-confirm" placeholder="Confirm" minlength="6" required />
      </div>
      <button type="submit" class="btn btn-primary">Account Banayein</button>
      <div class="error-box" id="signup-error"></div>
    </form>

    <div class="auth-footer">
      <p>Pehle se account hai? <button class="btn-text" onclick="showScreen('login')">Login karein</button></p>
    </div>
  </div>
</div>

<!-- PROFILE SCREEN -->
<div class="screen" id="screen-profile">
  <div class="auth-box">
    <div class="brand">
      <div class="brand-icon">👤</div>
      <h1>Profile Banayein</h1>
    </div>
    <p class="subtitle">Apka naam likhen</p>

    <form id="form-profile">
      <div class="input-group">
        <label>Poora Naam</label>
        <input type="text" id="profile-name" placeholder="Muhammad Hussain" required />
      </div>
      <button type="submit" class="btn btn-primary">Shuru Karein</button>
      <div class="error-box" id="profile-error"></div>
    </form>
  </div>
</div>

<!-- MAIN APP SCREEN -->
<div class="screen" id="screen-app">
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="profile-card">
          <div class="avatar" id="my-avatar"></div>
          <div>
            <div id="my-name" class="profile-name"></div>
            <div id="my-email" class="profile-email"></div>
          </div>
        </div>
        <div class="sidebar-buttons">
          <button class="icon-btn" id="btn-theme" title="Dark/Light">🌙</button>
          <button class="icon-btn" id="btn-new-group" title="Naya group">👥</button>
          <button class="icon-btn" id="btn-add" title="Contact add karein">➕</button>
          <button class="icon-btn" id="btn-logout" title="Logout">⏻</button>
        </div>
      </div>

      <div id="requests-section" class="requests-section" style="display:none;">
        <div class="requests-title">Naye Contact Requests</div>
        <div id="requests-list"></div>
      </div>

      <div class="contacts-list" id="contacts-list"></div>
    </aside>

    <!-- Chat -->
    <div class="chat-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <p>Chat select karein</p>
      </div>

      <div class="chat-window" id="chat-window">
        <div class="chat-header">
          <div>
            <h3 id="chat-name"></h3>
            <p id="chat-status"></p>
          </div>
          <button class="icon-btn" onclick="closeChat()">✕</button>
        </div>
        <div class="messages-box" id="messages-box"></div>
        <form class="message-form" id="message-form">
          <button type="button" class="btn-attach" id="btn-attach" title="Photo bhejein">📎</button>
          <input type="file" id="file-input" accept="image/*" style="display:none;" />
          <button type="button" class="btn-mic" id="btn-mic" title="Voice message" style="display:none;">🎤</button>
          <input type="text" id="message-input" placeholder="Message likhen..." />
          <button type="submit" class="btn-send">➤</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Add Contact Modal -->
  <div class="modal" id="modal-add-contact">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Contact Add Karein</h2>
        <button class="btn-close" onclick="closeModal('modal-add-contact')">✕</button>
      </div>
      <form id="form-add-contact">
        <div class="input-group">
          <label>Unka Email</label>
          <input type="email" id="add-contact-email" placeholder="unka@email.com" required />
        </div>
        <div class="input-group">
          <label>Aap unhein kis naam se save karna chahte hain</label>
          <input type="text" id="add-contact-name" placeholder="Jaise: Ali Bhai" required />
        </div>
        <button type="submit" class="btn btn-primary">Request Bhejein</button>
        <div class="error-box" id="add-contact-error"></div>
      </form>
    </div>
  </div>

  <!-- New Group Modal -->
  <div class="modal" id="modal-new-group">
    <div class="modal-box">
      <div class="modal-header">
        <h2>Naya Group</h2>
        <button class="btn-close" onclick="closeModal('modal-new-group')">✕</button>
      </div>
      <form id="form-new-group">
        <div class="input-group">
          <label>Group ka Naam</label>
          <input type="text" id="group-name" placeholder="Jaise: Family" required />
        </div>
        <div class="input-group">
          <label>Members Chunein</label>
          <div id="group-members-list" class="group-members-list"></div>
        </div>
        <button type="submit" class="btn btn-primary">Group Banayein</button>
        <div class="error-box" id="group-error"></div>
      </form>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="./config.js"></script>
<script src="./app.js"></script>
</body>
</html>
